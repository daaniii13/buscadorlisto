<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de contactos</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="perfil-contenedor" id="contenedorLoginFlotante">
        <button id="btnPerfilToggle" class="boton boton--secundario">Iniciar sesión</button>

        <div id="panelPerfil" class="panel-desplegable oculto">
            <div id="loginForm" class="login-form">
                <h3 style="margin-bottom: 12px; font-size: 15px; font-weight: 800;">Login</h3>
                <div class="campo" style="margin-bottom: 8px;">
                    <input type="email" id="loginEmail" placeholder="correo@ejemplo.com">
                </div>
                <div class="campo" style="margin-bottom: 8px;">
                    <input type="password" id="loginPassword" placeholder="Contraseña">
                </div>
                <button type="button" class="boton boton--principal" style="width: 100%;" id="btnLogin">Ingresar</button>
                <small class="login-panel__error oculto" id="loginError"></small>
            </div>
            
            <div id="loggedInPanel" class="oculto">
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
                    <span class="login-panel__badge" id="rolBadge"></span>
                    <p id="usuarioNombre" style="font-weight: 700; margin: 0; font-size: 14px;"></p>
                </div>
                
                <button type="button" class="boton boton--principal" id="btnNuevoUsuario" style="width: 100%; margin-bottom: 10px; border-color: #8b5cf6; color: #8b5cf6; display: none;">+ Crear Usuario</button>
                
                <button type="button" class="boton boton--secundario" id="btnVerUsuarios" style="width: 100%; margin-bottom: 10px; display: none;">Ver lista de usuarios</button>

                <div id="panel-usuarios" class="oculto" role="region" aria-label="Lista de usuarios" style="margin-bottom: 10px;">
                    <div style="border: 1px solid #e5e7eb; border-left: 4px solid #8b5cf6; border-radius: 8px; padding: 10px; background: #f8fafc;">
                        <ul id="lista-usuarios-ul" role="list" style="list-style: none; padding: 0; margin: 0; max-height: 190px; overflow-y: auto;">
                        </ul>
                    </div>
                </div>
                <button type="button" class="boton boton--secundario" style="width: 100%;" id="btnLogout">Cerrar sesión</button>
            </div>
        </div>
    </div>
    <div class="contenedor">
        <div class="cabecera">
            <h1>Buscador de contactos</h1>
            <div class="cabecera_acciones" id="accionesAdmin" style="display: none;">
                <button type="button" class="boton boton--principal" id="btnNuevoContacto">+ Nuevo contacto</button>
                <button type="button" class="boton boton--secundario" id="btnExportarPdf">Exportar PDF</button>
                <button type="button" class="boton boton--secundario" id="btnImportarCsv">Importar CSV</button>
                <button type="button" class="boton boton--secundario" id="btnExportarCsv">Exportar CSV</button>
                <button type="button" class="boton boton--eliminar" id="btnEliminarTodos">Eliminar todos</button>
                <input type="file" id="inputCsv" accept=".csv" style="display: none;">
            </div>
        </div>
        
        <div class="buscador">
            <input type="text" id="busqueda" placeholder="Busca el contacto" autofocus>
        </div>
        <div class="estado" id="estado"></div>
        
        <div class="panel-nuevo oculto" id="panelNuevo">
            <div class="tarjeta tarjeta--edicion">
                <div class="tarjeta_grid">
                    <div class="campo"><label>Nombre</label><input type="text" id="nuevoNombre" required></div>
                    <div class="campo"><label>Departamento</label><input type="text" id="nuevoDepartamento" required></div>
                    <div class="campo"><label>Extensión</label><input type="number" id="nuevoExtension" required></div>
                    
                    <div class="campo"><label>Correo</label><input type="text" id="nuevoEmail"></div>
                </div>
                <div class="tarjeta_acciones">
                    <button type="button" class="boton boton--guardar-edicion" id="guardarNuevoContacto">Guardar</button>
                    <button type="button" class="boton boton--secundario" id="cancelarNuevoContacto">Cancelar</button>
                </div>
            </div>
        </div>

        <div class="panel-nuevo oculto" id="panelNuevoUsuario">
            <div class="tarjeta tarjeta--auth" style="border-left-color: #8b5cf6;">
                <h3 style="margin-bottom: 15px; color: #6d28d9;">Nuevo usuario</h3>
                <div class="tarjeta_grid">
                    <div class="campo"><label>Nombre*</label><input type="text" id="nuevoUsuarioNombre" required></div>
                    <div class="campo"><label>Email*</label><input type="email" id="nuevoUsuarioEmail" required></div>
                    <div class="campo"><label>Contraseña*</label><input type="password" id="nuevoUsuarioPassword" required></div>
                </div>
                <div class="tarjeta_acciones">
                    <button type="button" class="boton boton--guardar-edicion" id="guardarNuevoUsuario">Crear usuario</button>
                    <button type="button" class="boton boton--secundario" id="cancelarNuevoUsuario">Cancelar</button>
                </div>
            </div>
        </div>

        <div id="panel-usuarios" class="oculto panel-nuevo" role="region" aria-label="Lista de usuarios">
            <div class="tarjeta tarjeta--auth" style="border-left-color: #8b5cf6;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h3 style="color: #6d28d9; margin: 0;">Gestión de Usuarios</h3>
                    <button type="button" id="btn-cerrar-usuarios" class="boton boton--secundario" style="padding: 4px 8px; font-size: 12px;">Cerrar</button>
                </div>
                <ul id="lista-usuarios-ul" role="list" style="list-style: none; padding: 0; margin: 0;">
                </ul>
            </div>
        </div>

        <div class="resultados" id="resultados"></div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
