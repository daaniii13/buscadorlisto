security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            logout:
                path: /api/auth/logout
                target: /index.html

    access_control:
        # Permitimos acceso público a las rutas de auth para que tu lógica manual funcione
        - { path: ^/api/auth/, roles: PUBLIC_ACCESS }
        - { path: ^/api/users, roles: ROLE_ADMIN }
        - { path: ^/api/contactos, methods: [POST, PUT, DELETE], roles: [ROLE_ADMIN, ROLE_ELEVATED] }
        - { path: ^/api/contactos/importar, methods: [POST], roles: ROLE_ADMIN }
        - { path: ^/api/contactos/batch/todos, methods: [DELETE], roles: ROLE_ADMIN }